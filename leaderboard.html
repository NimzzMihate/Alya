<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0d0d; --card:#161616; --border:#262626; --text-main:#fff; --text-dim:#888; --accent:#4ade80; --hover-bg:#1e1e1e; }
    [data-theme="light"] { --bg:#f5f5f5; --card:#fff; --border:#e0e0e0; --text-main:#111; --text-dim:#555; --accent:#16a34a; --hover-bg:#eee; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text-main); font-family: 'Inter',sans-serif; min-height: 100vh; padding-bottom: 80px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .fade-up { opacity:0; animation: fadeUp 0.5s ease forwards; }
    .fade-up.d1 { animation-delay:0.05s; } .fade-up.d2 { animation-delay:0.12s; } .fade-up.d3 { animation-delay:0.18s; }
    .reveal { opacity:0; transform:translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .page-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
    .page-title span { color: var(--accent); }
    .page-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

    .tabs { display:flex; gap:6px; margin-bottom:28px; }
    .tab-btn {
      background:var(--card); border:1px solid var(--border);
      border-radius:7px; padding:8px 16px; font-size:12px; font-weight:600;
      color:var(--text-dim); cursor:pointer; transition:all 0.2s;
      display:flex; align-items:center; gap:7px; font-family:'Inter',sans-serif;
    }
    .tab-btn:hover { border-color: var(--border); color: var(--text-main); }
    .tab-btn.active { background:var(--hover-bg); border-color:#444; color:var(--text-main); }

    /* PODIUM */
    .podium-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      align-items: end;
      margin-bottom: 32px;
      padding: 0 0 0 0;
    }

    .podium-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
    }

    .podium-item:hover { transform: translateY(-3px); }

    .podium-item.rank-1 {
      border-color: #3a3a1a;
      padding-top: 28px;
      padding-bottom: 28px;
    }

    .podium-item.rank-2 { border-color: #2a2a2a; }
    .podium-item.rank-3 { border-color: #2a1a0a; }

    .podium-medal {
      font-size: 28px;
      margin-bottom: 10px;
      display: block;
    }

    .podium-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 10px;
    }

    .podium-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--hover-bg);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800;
      margin: 0 auto;
      color: var(--text-main);
    }

    .podium-item.rank-1 .podium-avatar { border-color: #fbbf24; color: #fbbf24; }
    .podium-item.rank-2 .podium-avatar { border-color: #9ca3af; color: #9ca3af; }
    .podium-item.rank-3 .podium-avatar { border-color: #d97706; color: #d97706; }

    .podium-name {
      font-size: 13px; font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .podium-val {
      font-size: 13px; font-weight: 800;
      font-family: 'Fira Code', monospace;
    }

    .podium-item.rank-1 .podium-val { color: #fbbf24; }
    .podium-item.rank-2 .podium-val { color: #9ca3af; }
    .podium-item.rank-3 .podium-val { color: #d97706; }

    .podium-rank-num {
      position: absolute;
      top: -10px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 10px;
      font-size: 10px; font-weight: 700;
      font-family: 'Fira Code', monospace;
      color: var(--text-dim);
    }

    .podium-item.rank-1 .podium-rank-num { border-color: #fbbf24; color: #fbbf24; }

    .section-label {
      font-size:10px; font-weight:600; color:var(--text-dim);
      text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px;
      display:flex; align-items:center; gap:10px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .lb-table { width:100%; border-collapse:collapse; }
    .lb-table thead tr { border-bottom:1px solid var(--border); }
    .lb-table th { padding:9px 14px; text-align:left; font-size:10px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
    .lb-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
    .lb-table tbody tr:last-child { border-bottom:none; }
    .lb-table tbody tr:hover { background:var(--hover-bg); }
    .lb-table td { padding:11px 14px; font-size:13px; }
    .lb-table td.rank { font-family:'Fira Code',monospace; color:var(--text-dim); font-size:12px; }
    .lb-table td.name { font-weight:600; }
    .lb-table td.val { font-family:'Fira Code',monospace; color:var(--accent); font-size:12px; }

    .empty-state { text-align:center; padding:80px 24px; color:var(--text-dim); }
    .empty-state i { font-size:36px; margin-bottom:14px; display:block; }
    .loading-state { display:flex; align-items:center; justify-content:center; gap:12px; padding:80px; color:var(--text-dim); font-size:13px; }
    .spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }

    @media (max-width:600px) { .container { padding:24px 16px; } .podium-wrap { gap:8px; } }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <div class="page-title fade-up d1">Leader<span>board</span></div>
    <div class="page-sub fade-up d2">Ranking user berdasarkan berbagai kategori</div>
    <div class="tabs fade-up d3">
      <button class="tab-btn active" onclick="switchTab('level',this)"><i class="fa-solid fa-star"></i> Level</button>
      <button class="tab-btn" onclick="switchTab('saldo',this)"><i class="fa-solid fa-coins"></i> Saldo</button>
      <button class="tab-btn" onclick="switchTab('exp',this)"><i class="fa-solid fa-bolt"></i> EXP</button>
    </div>
    <div id="lbContainer"><div class="loading-state"><div class="spinner"></div><span>Memuat...</span></div></div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    injectNavCSS();
    renderNav();

    let lbData = null;
    let currentTab = "level";

    async function load() {
      lbData = await fetchData("leaderboard.json");
      if (!lbData) {
        document.getElementById("lbContainer").innerHTML = `
          <div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Data belum tersedia</p></div>`;
        return;
      }
      setLastUpdated(lbData.lastUpdated);
      render(currentTab);
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (lbData) render(tab);
    }

    function render(tab) {
      const c = document.getElementById("lbContainer");
      const list = lbData[tab] || [];

      if (!list.length) {
        c.innerHTML = `<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Belum ada data</p></div>`;
        return;
      }

      const fmtVal = (u) => tab === "saldo"
        ? "Rp " + formatNum(u[tab])
        : formatNum(u[tab]) + (tab === "level" ? " Lv" : " EXP");

      const medals = ["🥇", "🥈", "🥉"];
      const rankClass = ["rank-1", "rank-2", "rank-3"];

      // Podium order: 2nd left, 1st center, 3rd right
      const podiumOrder = list.length >= 3
        ? [list[1], list[0], list[2]]
        : list.length === 2
          ? [list[1], list[0]]
          : [list[0]];

      const podiumClasses = list.length >= 3
        ? ["rank-2", "rank-1", "rank-3"]
        : list.length === 2
          ? ["rank-2", "rank-1"]
          : ["rank-1"];

      const medalOrder = list.length >= 3 ? [1, 0, 2] : list.length === 2 ? [1, 0] : [0];

      const podiumHtml = `
        <div class="podium-wrap reveal">
          ${podiumOrder.map((u, i) => `
            <div class="podium-item ${podiumClasses[i]}">
              <div class="podium-rank-num">#${medalOrder[i] + 1}</div>
              <span class="podium-medal">${medals[medalOrder[i]]}</span>
              <div class="podium-avatar">${(u.name || "?")[0].toUpperCase()}</div>
              <div class="podium-name">${esc(u.name)}</div>
              <div class="podium-val">${fmtVal(u)}</div>
            </div>`).join("")}
        </div>`;

      const rest = list.slice(3);
      const tableHtml = rest.length ? `
        <div class="section-label reveal">Selanjutnya</div>
        <table class="lb-table reveal">
          <thead><tr><th>#</th><th>Nama</th><th>${tab.charAt(0).toUpperCase()+tab.slice(1)}</th></tr></thead>
          <tbody>
            ${rest.map((u, i) => `
              <tr>
                <td class="rank">${i + 4}</td>
                <td class="name">${esc(u.name)}</td>
                <td class="val">${fmtVal(u)}</td>
              </tr>`).join("")}
          </tbody>
        </table>` : "";

      c.innerHTML = podiumHtml + tableHtml;

      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } });
      }, { threshold: 0.1 });
      document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
    }

    function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
