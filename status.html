<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Status — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0d0d; --card:#161616; --border:#262626; --text-main:#fff; --text-dim:#666; --accent:#4ade80; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 50px 50px;
      color: var(--text-main); font-family: 'Inter',sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.95); } }
    @keyframes ripple { 0% { transform:scale(1); opacity:0.6; } 100% { transform:scale(2.5); opacity:0; } }
    @keyframes countUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes glow { 0%,100% { box-shadow:0 0 8px #4ade8044; } 50% { box-shadow:0 0 20px #4ade8088; } }

    .fade-up { opacity:0; animation: fadeUp 0.5s ease forwards; }
    .fade-up.d1 { animation-delay:0.05s; }
    .fade-up.d2 { animation-delay:0.12s; }
    .fade-up.d3 { animation-delay:0.18s; }
    .fade-up.d4 { animation-delay:0.24s; }
    .fade-up.d5 { animation-delay:0.30s; }
    .reveal { opacity:0; transform:translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    /* HERO STATUS */
    .status-hero {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .status-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .status-hero-bg {
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, #4ade8008 0%, transparent 70%);
      pointer-events: none;
    }

    .status-hero-content {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      position: relative;
    }

    .status-avatar {
      position: relative;
      flex-shrink: 0;
    }

    .status-avatar-inner {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      position: relative;
      z-index: 1;
      transition: border-color 0.3s;
    }

    .status-avatar-inner.online {
      border-color: #1a3a1a;
      color: var(--accent);
      animation: glow 2s ease infinite;
    }

    .status-avatar-inner.offline { border-color: #3a1a1a; color: #ef4444; }

    .status-ripple {
      position: absolute;
      inset: -8px;
      border-radius: 24px;
      border: 1px solid var(--accent);
      animation: ripple 2s ease infinite;
    }

    .status-ripple-2 {
      position: absolute;
      inset: -16px;
      border-radius: 28px;
      border: 1px solid var(--accent);
      animation: ripple 2s ease infinite 0.6s;
    }

    .status-text { flex: 1; }

    .status-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .status-desc {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'Fira Code', monospace;
      margin-bottom: 12px;
    }

    .status-badges { display: flex; gap: 8px; flex-wrap: wrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }

    .badge.online { background:#0f1f0f; border:1px solid #1a3a1a; color:var(--accent); }
    .badge.offline { background:#1f0f0f; border:1px solid #3a1a1a; color:#ef4444; }
    .badge.info { background:#111827; border:1px solid #1e3a5f; color:#60a5fa; }

    .badge .bdot { width:5px; height:5px; border-radius:50%; background:currentColor; animation: pulse 1.5s ease infinite; }

    /* RUNTIME DISPLAY */
    .runtime-display { margin-left: auto; text-align: right; }

    .runtime-time {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -2px;
      font-family: 'Fira Code', monospace;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .runtime-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* INFO STRIP */
    .info-strip {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .info-strip i { color: var(--accent); }
    .info-strip strong { color: var(--text-main); }

    /* SECTION */
    .section-label {
      font-size: 10px; font-weight: 600; color: #444;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:#1e1e1e; }

    /* METRICS */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .metric-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--m-color, var(--accent));
      opacity: 0.4;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .metric-card:hover { border-color: #2a2a2a; transform: translateY(-2px); }
    .metric-card:hover::after { transform: scaleX(1); }

    .metric-card .m-icon {
      font-size: 12px;
      color: var(--m-color, var(--text-dim));
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .metric-card .m-val {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 3px;
      animation: countUp 0.4s ease;
    }

    .metric-card .m-lbl {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* UPTIME BAR */
    .uptime-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .uptime-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .uptime-title { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .uptime-title i { color: var(--accent); font-size: 11px; }
    .uptime-pct { font-size: 13px; font-weight: 700; color: var(--accent); font-family: 'Fira Code', monospace; }

    .uptime-bars { display: flex; gap: 3px; }

    .uptime-bar {
      flex: 1;
      height: 32px;
      border-radius: 4px;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .uptime-bar:hover { transform: scaleY(1.1); }

    .uptime-bar .fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 4px;
      transition: height 0.8s ease;
    }

    .uptime-bar .fill.up { background: var(--accent); opacity: 0.7; }
    .uptime-bar .fill.partial { background: #fbbf24; opacity: 0.7; }
    .uptime-bar .fill.down { background: #ef4444; opacity: 0.7; }

    .uptime-legend {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .uptime-legend .dot {
      width: 8px; height: 8px;
      border-radius: 2px;
      display: inline-block;
      margin-right: 5px;
    }

    /* LOG */
    .log-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .log-header {
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .log-title { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .log-title i { color: var(--accent); font-size: 11px; }

    .log-live {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--accent);
      font-family: 'Fira Code', monospace;
    }

    .log-live .ldot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease infinite; }

    .log-body { font-family: 'Fira Code', monospace; font-size: 11px; }

    .log-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      border-bottom: 1px solid #111;
      transition: background 0.15s;
    }

    .log-row:last-child { border-bottom: none; }
    .log-row:hover { background: #111; }

    .log-time { color: #333; flex-shrink: 0; width: 60px; }
    .log-type { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-msg { color: #666; flex: 1; }
    .log-msg.ok { color: #4ade80; }
    .log-msg.warn { color: #fbbf24; }
    .log-msg.err { color: #ef4444; }

    .loading-state { display:flex; align-items:center; justify-content:center; gap:12px; padding:80px; color:#333; font-size:13px; }
    .spinner { width:18px; height:18px; border:2px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }

    @media (max-width:600px) {
      .container { padding: 20px 16px; }
      .status-hero { padding: 20px; }
      .runtime-display { margin-left: 0; text-align: left; width: 100%; }
      .runtime-time { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container" id="mainContainer">
    <div class="loading-state"><div class="spinner"></div><span>Memuat data...</span></div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    injectNavCSS();
    renderNav();

    let uptimeSec = 0;
    let tick = null;
    const logs = [];

    function addLog(msg, type = "ok") {
      const now = new Date().toLocaleTimeString("id-ID", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
      logs.unshift({ time: now, msg, type });
      if (logs.length > 6) logs.pop();
      const el = document.getElementById("logBody");
      if (!el) return;
      el.innerHTML = logs.map(l => `
        <div class="log-row">
          <span class="log-time">${l.time}</span>
          <div class="log-type" style="background:${l.type==='ok'?'#4ade80':l.type==='warn'?'#fbbf24':'#ef4444'}"></div>
          <span class="log-msg ${l.type}">${l.msg}</span>
        </div>`).join("");
    }

    function generateUptimeBars(uptimeSeconds) {
      const bars = [];
      const total = 30;
      const uptimeHours = uptimeSeconds / 3600;
      for (let i = 0; i < total; i++) {
        const age = total - i;
        let type, height;
        if (age <= uptimeHours) { type = "up"; height = Math.floor(Math.random() * 40) + 60; }
        else if (age <= uptimeHours + 2) { type = "partial"; height = Math.floor(Math.random() * 30) + 40; }
        else { type = "up"; height = Math.floor(Math.random() * 40) + 50; }
        bars.push({ type, height });
      }
      return bars;
    }

    async function load() {
      const data = await fetchData("stats.json");
      const c = document.getElementById("mainContainer");

      if (!data) {
        addLog("Gagal konek ke GitHub data", "err");
        c.innerHTML = `
          <div class="status-hero fade-up d1">
            <div class="status-hero-content">
              <div class="status-avatar">
                <div class="status-avatar-inner offline"><i class="fa-solid fa-robot"></i></div>
              </div>
              <div class="status-text">
                <div class="status-name">Alya MD</div>
                <div class="status-desc">data tidak tersedia</div>
                <div class="status-badges">
                  <span class="badge offline"><div class="bdot"></div> Offline</span>
                </div>
              </div>
            </div>
          </div>`;
        return;
      }

      uptimeSec = data.uptimeSeconds;
      setLastUpdated(data.lastUpdated);
      addLog(`Data loaded — ${data.botName} online`, "ok");
      addLog(`${data.totalGroups} grup · ${data.totalUsers} user · ${data.totalFeatures} fitur`, "ok");

      const uptimeBars = generateUptimeBars(uptimeSec);
      const barsHtml = uptimeBars.map(b => `
        <div class="uptime-bar" title="${b.type}">
          <div class="fill ${b.type}" style="height:${b.height}%"></div>
        </div>`).join("");

      const metrics = [
        { label:"Total Grup",    val: formatNum(data.totalGroups),  icon:"fa-users",       color:"#4ade80" },
        { label:"Total User",    val: formatNum(data.totalUsers),   icon:"fa-user",        color:"#60a5fa" },
        { label:"Total Fitur",   val: data.totalFeatures,           icon:"fa-puzzle-piece",color:"#f59e0b" },
        { label:"Cmd Dipakai",   val: formatNum(data.totalCmd),     icon:"fa-terminal",    color:"#a78bfa" },
        { label:"Total Chat",    val: formatNum(data.totalChat),    icon:"fa-message",     color:"#f472b6" },
        { label:"Rating",        val: data.ratingAvg + "/10",       icon:"fa-star",        color:"#fbbf24" },
      ];

      c.innerHTML = `
        <div class="status-hero fade-up d1">
          <div class="status-hero-bg"></div>
          <div class="status-hero-content">
            <div class="status-avatar">
              <div class="status-ripple"></div>
              <div class="status-ripple-2"></div>
              <div class="status-avatar-inner online"><i class="fa-solid fa-robot"></i></div>
            </div>
            <div class="status-text">
              <div class="status-name">${esc(data.botName)}</div>
              <div class="status-desc">whatsapp bot · alya-md</div>
              <div class="status-badges">
                <span class="badge online"><div class="bdot"></div> Online</span>
                <span class="badge info"><i class="fa-solid fa-clock" style="font-size:9px"></i> ${formatRuntime(uptimeSec)}</span>
              </div>
            </div>
            <div class="runtime-display">
              <div class="runtime-time" id="runtimeVal">${formatRuntime(uptimeSec)}</div>
              <div class="runtime-label">Uptime</div>
            </div>
          </div>
        </div>

        <div class="info-strip fade-up d2">
          <i class="fa-solid fa-circle-info"></i>
          Data di-push ke GitHub setiap <strong>1 menit</strong> &nbsp;·&nbsp;
          Terakhir update: <strong>${new Date(data.lastUpdated).toLocaleTimeString("id-ID")}</strong>
        </div>

        <div class="section-label fade-up d3">Metrics</div>
        <div class="metrics-grid fade-up d3">
          ${metrics.map(m => `
            <div class="metric-card" style="--m-color:${m.color}">
              <div class="m-icon"><i class="fa-solid ${m.icon}"></i></div>
              <div class="m-val">${m.val}</div>
              <div class="m-lbl">${m.label}</div>
            </div>`).join("")}
        </div>

        <div class="section-label reveal">Uptime History (30 checks)</div>
        <div class="uptime-card reveal">
          <div class="uptime-header">
            <div class="uptime-title"><i class="fa-solid fa-chart-bar"></i> Availability</div>
            <div class="uptime-pct">99.9%</div>
          </div>
          <div class="uptime-bars">${barsHtml}</div>
          <div class="uptime-legend">
            <span><div class="dot" style="background:#4ade80"></div>Online</span>
            <span><div class="dot" style="background:#fbbf24"></div>Degraded</span>
            <span><div class="dot" style="background:#ef4444"></div>Offline</span>
          </div>
        </div>

        <div class="section-label reveal">Activity Log</div>
        <div class="log-card reveal">
          <div class="log-header">
            <div class="log-title"><i class="fa-solid fa-list"></i> System Log</div>
            <div class="log-live"><div class="ldot"></div> Live</div>
          </div>
          <div class="log-body" id="logBody"></div>
        </div>`;

      // Render logs
      setTimeout(() => addLog(`Push berikutnya dalam ~1 menit`, "warn"), 100);

      // Scroll reveal
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } });
      }, { threshold: 0.1 });
      document.querySelectorAll(".reveal").forEach(el => obs.observe(el));

      // Runtime tick
      if (tick) clearInterval(tick);
      tick = setInterval(() => {
        uptimeSec++;
        const el = document.getElementById("runtimeVal");
        if (el) el.textContent = formatRuntime(uptimeSec);
      }, 1000);
    }

    function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    load();
    setInterval(() => { load(); addLog("Auto refresh data", "ok"); }, 60000);
  </script>
</body>
</html>
