<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Status — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0d0d; --card:#161616; --border:#262626; --text-main:#fff; --text-dim:#888; --accent:#4ade80; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 50px 50px;
      color: var(--text-main); font-family: 'Inter',sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .page-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
    .page-title span { color: var(--accent); }
    .page-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 36px; }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .status-main {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .status-icon {
      width: 64px; height: 64px; border-radius: 14px;
      background: #1f1f1f; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .status-icon.online { border-color: #1a3a1a; color: var(--accent); }
    .status-icon.offline { border-color: #3a1a1a; color: #ef4444; }
    .status-info .bot-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .status-info .bot-num { font-family:'Fira Code',monospace; font-size:13px; color:var(--text-dim); margin-bottom:10px; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .status-pill.online { background:#0f1f0f; border:1px solid #1a3a1a; color:var(--accent); }
    .status-pill.offline { background:#1f0f0f; border:1px solid #3a1a1a; color:#ef4444; }
    .status-pill .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
    .runtime-section { margin-left: auto; text-align: right; }
    .runtime-val { font-size: 36px; font-weight: 800; letter-spacing: -2px; font-family:'Fira Code',monospace; color:var(--accent); }
    .runtime-lbl { font-size: 11px; color:var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

    .last-update-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 32px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-dim);
    }
    .last-update-card i { color: var(--accent); }
    .last-update-card span { color: var(--text-main); font-family:'Fira Code',monospace; }

    .metrics-grid {
      display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
      gap: 12px; margin-bottom: 32px;
    }
    .metric-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; transition: border-color 0.2s;
    }
    .metric-card:hover { border-color: #333; }
    .metric-card .ico { font-size: 13px; color:var(--text-dim); margin-bottom: 8px; }
    .metric-card .val { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 3px; }
    .metric-card .lbl { font-size: 11px; color:var(--text-dim); }

    .loading-state { display:flex; align-items:center; justify-content:center; gap:12px; padding:80px; color:#333; font-size:13px; }
    .spinner { width:18px; height:18px; border:2px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:600px) { .container { padding:24px 16px; } .runtime-section { margin-left:0; text-align:left; } }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <div class="page-title">Status <span>Bot</span></div>
    <div class="page-sub">Monitor kondisi dan performa bot</div>

    <div id="statusContainer">
      <div class="loading-state"><div class="spinner"></div><span>Memuat data...</span></div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    injectNavCSS();
    renderNav();

    let uptimeSec = 0;
    let tick = null;

    async function load() {
      const data = await fetchData("stats.json");
      const c = document.getElementById("statusContainer");

      if (!data) {
        c.innerHTML = `
          <div class="status-main">
            <div class="status-icon offline"><i class="fa-solid fa-robot"></i></div>
            <div class="status-info">
              <div class="bot-name">Alya MD</div>
              <div class="bot-num">Data tidak tersedia</div>
              <div class="status-pill offline"><div class="dot"></div> Offline / Belum ada data</div>
            </div>
          </div>`;
        return;
      }

      uptimeSec = data.uptimeSeconds;
      setLastUpdated(data.lastUpdated);

      c.innerHTML = `
        <div class="section-label">Bot Status</div>
        <div class="status-main">
          <div class="status-icon online"><i class="fa-solid fa-robot"></i></div>
          <div class="status-info">
            <div class="bot-name">${esc(data.botName)}</div>
            <div class="bot-num">Data terakhir: ${new Date(data.lastUpdated).toLocaleString("id-ID")}</div>
            <div class="status-pill online"><div class="dot"></div> Data Tersedia</div>
          </div>
          <div class="runtime-section">
            <div class="runtime-val" id="runtimeVal">${formatRuntime(uptimeSec)}</div>
            <div class="runtime-lbl">Uptime saat push</div>
          </div>
        </div>

        <div class="last-update-card">
          <i class="fa-solid fa-clock-rotate-left"></i>
          Data di-push ke GitHub setiap <span>1 menit</span> — terakhir update: <span>${new Date(data.lastUpdated).toLocaleTimeString("id-ID")}</span>
        </div>

        <div class="section-label">Metrics</div>
        <div class="metrics-grid">
          <div class="metric-card"><div class="ico"><i class="fa-solid fa-users"></i></div><div class="val">${formatNum(data.totalGroups)}</div><div class="lbl">Total Grup</div></div>
          <div class="metric-card"><div class="ico"><i class="fa-solid fa-user"></i></div><div class="val">${formatNum(data.totalUsers)}</div><div class="lbl">Total User</div></div>
          <div class="metric-card"><div class="ico"><i class="fa-solid fa-terminal"></i></div><div class="val">${formatNum(data.totalCmd)}</div><div class="lbl">Command Dipakai</div></div>
          <div class="metric-card"><div class="ico"><i class="fa-solid fa-message"></i></div><div class="val">${formatNum(data.totalChat)}</div><div class="lbl">Total Chat</div></div>
          <div class="metric-card"><div class="ico"><i class="fa-solid fa-puzzle-piece"></i></div><div class="val">${data.totalFeatures}</div><div class="lbl">Total Fitur</div></div>
          <div class="metric-card"><div class="ico"><i class="fa-solid fa-star"></i></div><div class="val">${data.ratingAvg}/10</div><div class="lbl">Rating</div></div>
        </div>`;

      if (tick) clearInterval(tick);
      tick = setInterval(() => {
        uptimeSec++;
        const el = document.getElementById("runtimeVal");
        if (el) el.textContent = formatRuntime(uptimeSec);
      }, 1000);
    }

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
