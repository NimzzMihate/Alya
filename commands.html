<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commands — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0d0d; --card:#161616; --border:#262626; --text-main:#fff; --text-dim:#888; --accent:#4ade80; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 50px 50px;
      color: var(--text-main); font-family: 'Inter',sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .page-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
    .page-title span { color: var(--accent); }
    .page-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
    .toolbar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap i { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:13px; }
    .search-input {
      width:100%; background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:10px 14px 10px 36px; color:var(--text-main);
      font-family:'Inter',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s;
    }
    .search-input:focus { border-color:#333; }
    .search-input::placeholder { color:#444; }
    .total-badge {
      background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:11px 16px; margin-bottom:18px;
      font-size:13px; color:var(--text-dim);
      display:flex; align-items:center; gap:8px;
    }
    .total-badge span { color:var(--accent); font-weight:700; font-size:16px; }
    .cmd-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:9px; }
    .cmd-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:13px 15px;
      transition:border-color 0.2s, transform 0.2s;
    }
    .cmd-card:hover { border-color:#333; transform:translateY(-2px); }
    .cmd-card .cmd { font-family:'Fira Code',monospace; font-size:13px; color:var(--accent); margin-bottom:3px; display:flex; align-items:center; justify-content:space-between; }
    .cmd-card .usage { font-size:11px; color:#444; }
    .usage-count { font-family:'Fira Code',monospace; font-size:10px; color:#333; }
    .empty-state { text-align:center; padding:80px 24px; color:#333; }
    .empty-state i { font-size:36px; margin-bottom:14px; display:block; }
    .empty-state p { font-size:13px; }
    .loading-state { display:flex; align-items:center; justify-content:center; gap:12px; padding:80px; color:#333; font-size:13px; }
    .spinner { width:18px; height:18px; border:2px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:600px) { .cmd-grid { grid-template-columns:repeat(2,1fr); } .container { padding:24px 16px; } }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <div class="page-title">List <span>Commands</span></div>
    <div class="page-sub">Semua command yang tersedia di Alya MD</div>
    <div class="toolbar">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input class="search-input" type="text" placeholder="Cari command..." id="searchBox" oninput="filter()"/>
      </div>
    </div>
    <div class="total-badge"><i class="fa-solid fa-puzzle-piece" style="color:var(--accent)"></i> Total <span id="total">-</span> command tersedia</div>
    <div id="cmdContainer"><div class="loading-state"><div class="spinner"></div><span>Memuat...</span></div></div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    injectNavCSS();
    renderNav();
    let allCmds = [], usage = {};

    async function load() {
      const data = await fetchData("commands.json");
      if (!data) {
        document.getElementById("cmdContainer").innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Data belum tersedia</p></div>`;
        return;
      }
      allCmds = data.commands || [];
      usage = data.usage || {};
      document.getElementById("total").textContent = allCmds.length;
      setLastUpdated(data.lastUpdated);
      render(allCmds);
    }

    function render(cmds) {
      const c = document.getElementById("cmdContainer");
      if (!cmds.length) {
        c.innerHTML = `<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Tidak ada command ditemukan</p></div>`;
        return;
      }
      c.innerHTML = `<div class="cmd-grid">${cmds.map(cmd => `
        <div class="cmd-card">
          <div class="cmd">
            <span>.${esc(cmd)}</span>
            ${usage[cmd] ? `<span class="usage-count">${usage[cmd]}x</span>` : ""}
          </div>
          <div class="usage">command</div>
        </div>`).join("")}</div>`;
    }

    function filter() {
      const q = document.getElementById("searchBox").value.toLowerCase();
      render(allCmds.filter(c => c.toLowerCase().includes(q)));
    }

    load();
  </script>
</body>
</html>
