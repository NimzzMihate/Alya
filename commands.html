<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commands — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d0d0d; --card:#161616; --border:#262626; --text-main:#fff; --text-dim:#666; --accent:#4ade80; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 50px 50px;
      color: var(--text-main); font-family: 'Inter',sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }

    .fade-up { opacity:0; animation: fadeUp 0.5s ease forwards; }
    .fade-up.d1 { animation-delay:0.05s; }
    .fade-up.d2 { animation-delay:0.12s; }
    .fade-up.d3 { animation-delay:0.18s; }
    .fade-up.d4 { animation-delay:0.24s; }

    .reveal { opacity:0; transform:translateY(16px); transition: opacity 0.4s ease, transform 0.4s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    .page-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
    .page-title span { color: var(--accent); }
    .page-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 28px; }

    /* STATS ROW */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-dim);
      transition: border-color 0.2s;
    }

    .stat-pill:hover { border-color: #2a2a2a; }
    .stat-pill i { color: var(--accent); font-size: 11px; }
    .stat-pill strong { color: var(--text-main); font-size: 15px; font-weight: 800; font-family: 'Fira Code', monospace; }

    /* TOOLBAR */
    .toolbar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 13px;
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 36px;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      border-color: #2a2a2a;
      box-shadow: 0 0 0 3px rgba(74,222,128,0.06);
    }

    .search-input:focus + .search-icon { color: var(--accent); }
    .search-input::placeholder { color: #333; }

    .sort-select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-dim);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .sort-select:focus { border-color: #2a2a2a; }

    /* RESULT INFO */
    .result-info {
      font-size: 11px;
      color: #333;
      margin-bottom: 14px;
      font-family: 'Fira Code', monospace;
      height: 16px;
      transition: opacity 0.2s;
    }

    /* CMD GRID */
    .cmd-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 8px;
    }

    .cmd-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: default;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
    }

    .cmd-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(74,222,128,0.04), transparent);
      transition: left 0.4s ease;
    }

    .cmd-card:hover { border-color: #2a2a2a; transform: translateY(-2px); background: #181818; }
    .cmd-card:hover::before { left: 150%; }

    .cmd-card .cmd-name {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .cmd-card .cmd-name .dot-prefix { color: #2a6a2a; }

    .cmd-card .cmd-type {
      font-size: 10px;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .usage-badge {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 10px;
      background: #1a2a1a;
      border: 1px solid #2a3a2a;
      color: #4ade8088;
      flex-shrink: 0;
    }

    /* SKELETON */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 8px;
    }

    .skeleton-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      height: 56px;
    }

    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 8px;
    }

    .skeleton-line.short { width: 60%; height: 9px; }

    .empty-state { text-align:center; padding:80px 24px; color:#333; }
    .empty-state i { font-size:36px; margin-bottom:14px; display:block; }
    .empty-state p { font-size:13px; }

    .spinner { width:18px; height:18px; border:2px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }

    @media (max-width:600px) {
      .cmd-grid { grid-template-columns: repeat(2,1fr); }
      .container { padding: 24px 16px; }
      .stats-row { gap: 8px; }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <div class="page-title fade-up d1">List <span>Commands</span></div>
    <div class="page-sub fade-up d2">Semua command yang tersedia di Alya MD</div>

    <div class="stats-row fade-up d3" id="statsRow">
      <div class="stat-pill"><i class="fa-solid fa-puzzle-piece"></i> Total <strong id="totalAll">-</strong> commands</div>
      <div class="stat-pill"><i class="fa-solid fa-magnifying-glass"></i> Showing <strong id="totalShown">-</strong> results</div>
      <div class="stat-pill"><i class="fa-solid fa-fire"></i> Most used: <strong id="mostUsed">-</strong></div>
    </div>

    <div class="toolbar fade-up d4">
      <div class="search-wrap">
        <input class="search-input" type="text" placeholder="Cari command..." id="searchBox" oninput="filter()"/>
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
      </div>
      <select class="sort-select" id="sortSelect" onchange="filter()">
        <option value="az">A-Z</option>
        <option value="za">Z-A</option>
        <option value="popular">Paling Sering</option>
      </select>
    </div>

    <div class="result-info" id="resultInfo"></div>
    <div id="cmdContainer"><div class="skeleton-grid">${Array(24).fill(0).map(() => `<div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>`).join("")}</div></div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    injectNavCSS();
    renderNav();

    let allCmds = [], usage = {};

    async function load() {
      const data = await fetchData("commands.json");
      if (!data) {
        document.getElementById("cmdContainer").innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p>Data belum tersedia</p>
          </div>`;
        return;
      }

      allCmds = data.commands || [];
      usage = data.usage || {};
      setLastUpdated(data.lastUpdated);

      document.getElementById("totalAll").textContent = allCmds.length;

      const topCmd = Object.entries(usage).sort((a,b) => b[1]-a[1])[0];
      document.getElementById("mostUsed").textContent = topCmd ? "." + topCmd[0] : "-";

      filter();
    }

    function render(cmds) {
      const c = document.getElementById("cmdContainer");
      document.getElementById("totalShown").textContent = cmds.length;

      const q = document.getElementById("searchBox").value.toLowerCase();
      document.getElementById("resultInfo").textContent = q
        ? `${cmds.length} hasil untuk "${q}"`
        : "";

      if (!cmds.length) {
        c.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-inbox"></i>
            <p>Tidak ada command ditemukan</p>
          </div>`;
        return;
      }

      c.innerHTML = `<div class="cmd-grid">${cmds.map((cmd, i) => `
        <div class="cmd-card reveal" style="transition-delay:${Math.min(i*0.02, 0.3)}s">
          <div class="cmd-name">
            <span><span class="dot-prefix">.</span>${esc(cmd)}</span>
            ${usage[cmd] ? `<span class="usage-badge">${usage[cmd]}x</span>` : ""}
          </div>
          <div class="cmd-type">command</div>
        </div>`).join("")}</div>`;

      // Scroll reveal
      requestAnimationFrame(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); }
          });
        }, { threshold: 0.05 });
        document.querySelectorAll(".cmd-card.reveal").forEach(el => obs.observe(el));
      });
    }

    function filter() {
      const q = document.getElementById("searchBox").value.toLowerCase();
      const sort = document.getElementById("sortSelect").value;

      let filtered = allCmds.filter(c => c.toLowerCase().includes(q));

      if (sort === "az") filtered.sort((a, b) => a.localeCompare(b));
      else if (sort === "za") filtered.sort((a, b) => b.localeCompare(a));
      else if (sort === "popular") filtered.sort((a, b) => (usage[b] || 0) - (usage[a] || 0));

      render(filtered);
    }

    function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    load();
  </script>
</body>
</html>
