<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0d0d0d; --card:#161616; --border:#262626;
      --text-main:#fff; --text-dim:#666; --accent:#4ade80;
      --hover-bg:#1e1e1e; --input-bg:#1a1a1a;
    }
    [data-theme="light"] {
      --bg:#f5f5f5; --card:#fff; --border:#e0e0e0;
      --text-main:#111; --text-dim:#555; --accent:#16a34a;
      --hover-bg:#eee; --input-bg:#f0f0f0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { scroll-behavior:smooth; overflow-x:hidden; }
    body { background:var(--bg); color:var(--text-main); font-family:'Inter',sans-serif; min-height:100vh; padding-bottom:60px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
    @keyframes spin { to{transform:rotate(360deg);} }
    .fade{opacity:0;animation:fadeUp 0.4s ease forwards;}
    .fade.d1{animation-delay:.05s;}.fade.d2{animation-delay:.1s;}.fade.d3{animation-delay:.15s;}
    .fade.d4{animation-delay:.2s;}.fade.d5{animation-delay:.25s;}.fade.d6{animation-delay:.3s;}
    .reveal{opacity:0;transform:translateY(16px);transition:opacity 0.4s ease,transform 0.4s ease;}
    .reveal.visible{opacity:1;transform:translateY(0);}

    /* TOPBAR */
    .topbar {
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    [data-theme="light"] .topbar { background: rgba(245,245,245,0.95); }

    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-brand { font-size:14px; font-weight:800; letter-spacing:-0.5px; display:flex; align-items:center; gap:8px; }
    .topbar-brand i { color:var(--accent); }
    .topbar-sep { color:var(--border); font-size:16px; }
    .topbar-page { font-size:13px; color:var(--text-dim); }

    .topbar-right { display:flex; align-items:center; gap:8px; }

    .topbar-badge {
      font-size:11px; color:var(--text-dim);
      font-family:'Fira Code',monospace;
    }

    .topbar-btn {
      background:var(--card); border:1px solid var(--border);
      border-radius:7px; padding:6px 12px; color:var(--text-dim);
      font-size:12px; cursor:pointer; display:flex; align-items:center; gap:6px;
      transition:all 0.2s; font-family:'Inter',sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .topbar-btn:hover { border-color:var(--accent); color:var(--accent); }

    .topbar-icon-btn {
      background:var(--card); border:1px solid var(--border);
      border-radius:7px; width:34px; height:34px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--text-dim); font-size:13px;
      transition:all 0.2s; -webkit-tap-highlight-color:transparent;
    }
    .topbar-icon-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* HAMBURGER DROPDOWN */
    .top-dropdown {
      position:fixed; top:52px; right:0;
      width:240px; background:var(--card);
      border-left:1px solid var(--border);
      border-bottom:1px solid var(--border);
      border-radius:0 0 0 14px; padding:10px;
      z-index:299;
      transform:translateX(110%); visibility:hidden;
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1), visibility 0s linear 0.3s;
      max-height:calc(100vh - 52px); overflow-y:auto; overflow-x:hidden;
    }
    .top-dropdown.open {
      transform:translateX(0); visibility:visible;
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1), visibility 0s linear 0s;
    }
    .top-dropdown-link {
      display:flex; align-items:center; gap:12px;
      padding:10px 12px; border-radius:8px;
      font-size:13px; color:var(--text-dim);
      text-decoration:none; transition:all 0.15s;
      -webkit-tap-highlight-color:transparent;
    }
    .top-dropdown-link:hover { background:var(--hover-bg); color:var(--text-main); }
    .top-dropdown-link.active { background:var(--hover-bg); color:var(--text-main); font-weight:600; }
    .top-dropdown-link.active i:first-child { color:var(--accent); }
    .top-dropdown-link i { font-size:12px; width:16px; text-align:center; }
    .active-dot { margin-left:auto; font-size:6px; color:var(--accent); }
    .top-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.4); z-index:298; backdrop-filter:blur(2px);
    }
    .top-overlay.show { display:block; }

    /* CONTENT */
    .content { max-width:1100px; margin:0 auto; padding:28px; }

    .content-header { margin-bottom:24px; }
    .content-header h1 { font-size:1.6rem; font-weight:800; letter-spacing:-1px; margin-bottom:4px; }
    .content-header h1 span { color:var(--accent); }
    .content-header p { font-size:13px; color:var(--text-dim); }

    /* STAT CARDS */
    .stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(155px,1fr)); gap:12px; margin-bottom:24px; }

    .stat-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; padding:16px 18px;
      position:relative; overflow:hidden;
      transition:border-color 0.2s, transform 0.2s;
    }
    .stat-card::before {
      content:''; position:absolute; top:0; left:0;
      width:3px; height:100%;
      background:var(--accent-color, var(--accent));
      border-radius:10px 0 0 10px;
    }
    .stat-card:hover { border-color:#2a2a2a; transform:translateY(-2px); }
    .stat-card .stat-label { font-size:10px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
    .stat-card .stat-val { font-size:24px; font-weight:800; letter-spacing:-1px; margin-bottom:2px; }
    .stat-card .stat-sub { font-size:11px; color:var(--text-dim); }

    /* GRID */
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
    .grid-3-1 { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:20px; }

    /* CARD */
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .card-header {
      padding:14px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .card-title { font-size:12px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .card-title i { color:var(--accent); font-size:11px; }
    .card-badge {
      font-size:10px; padding:3px 8px; border-radius:20px;
      background:var(--hover-bg); border:1px solid var(--border);
      color:var(--text-dim); font-family:'Fira Code',monospace;
    }
    .card-body { padding:18px; }

    /* CHART */
    .chart-wrap { position:relative; height:200px; }

    /* CMD LIST */
    .cmd-list { padding:0; }
    .cmd-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 18px; border-bottom:1px solid var(--border);
      font-size:12px; transition:background 0.15s;
    }
    .cmd-item:last-child { border-bottom:none; }
    .cmd-item:hover { background:var(--hover-bg); }
    .cmd-item .n { font-size:10px; color:var(--text-dim); font-family:'Fira Code',monospace; width:18px; flex-shrink:0; }
    .cmd-item .name { font-family:'Fira Code',monospace; color:var(--accent); flex:1; }
    .cmd-item .bar-wrap { flex:1; height:3px; background:var(--hover-bg); border-radius:2px; overflow:hidden; }
    .cmd-item .bar { height:100%; background:var(--accent); opacity:0.5; border-radius:2px; transition:width 0.8s ease; }
    .cmd-item .cnt { font-family:'Fira Code',monospace; font-size:10px; color:var(--text-dim); width:36px; text-align:right; }

    /* RATING */
    .rating-display { display:flex; align-items:center; gap:20px; padding:18px; }
    .rating-num { font-size:52px; font-weight:800; letter-spacing:-3px; line-height:1; flex-shrink:0; }
    .rating-info { flex:1; }
    .rating-stars { display:flex; gap:3px; margin-bottom:6px; }
    .rating-stars i { font-size:13px; color:var(--border); }
    .rating-stars i.on { color:#fbbf24; }
    .rating-votes { font-size:12px; color:var(--text-dim); margin-bottom:10px; }
    .rating-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:10px; font-family:'Fira Code',monospace; }
    .rating-bar-row .rl { color:var(--text-dim); width:16px; text-align:right; }
    .rating-bar-row .rw { flex:1; height:3px; background:var(--hover-bg); border-radius:2px; overflow:hidden; }
    .rating-bar-row .rf { height:100%; background:#fbbf24; opacity:0.6; border-radius:2px; }

    /* ACTIVITY */
    .activity-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 18px; border-bottom:1px solid var(--border); font-size:12px;
    }
    .activity-item:last-child { border-bottom:none; }
    .activity-icon {
      width:28px; height:28px; border-radius:7px;
      background:var(--hover-bg); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0;
    }
    .activity-text { flex:1; color:var(--text-main); }
    .activity-text span { color:var(--accent); }
    .activity-time { font-size:10px; color:var(--text-dim); font-family:'Fira Code',monospace; }

    .loading-state { display:flex; align-items:center; justify-content:center; gap:12px; padding:60px; color:var(--text-dim); font-size:13px; }
    .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }

    @media (max-width:768px) {
      .grid-2,.grid-3-1 { grid-template-columns:1fr; }
      .content { padding:16px; }
      .topbar { padding:0 16px; }
      .rating-display { flex-direction:column; align-items:flex-start; gap:12px; }
      .topbar-badge { display:none; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-brand"><i class="fa-solid fa-robot"></i> ALYA MD</div>
    <span class="topbar-sep">/</span>
    <span class="topbar-page">Dashboard</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-badge" id="updatedBadge">-</span>
    <button class="topbar-btn" onclick="load()"><i class="fa-solid fa-arrows-rotate"></i> Refresh</button>
    <button class="topbar-icon-btn" id="themeBtn" onclick="toggleDashTheme()" title="Toggle theme">
      <i class="fa-solid fa-sun" id="themeIcon"></i>
    </button>
    <button class="topbar-icon-btn" id="menuBtn" onclick="toggleDashMenu()" title="Menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
    </button>
  </div>
</div>

<!-- DROPDOWN -->
<div class="top-dropdown" id="topDropdown">
  <a href="index.html" class="top-dropdown-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a href="status.html" class="top-dropdown-link"><i class="fa-solid fa-signal"></i><span>Status</span></a>
  <a href="dashboard.html" class="top-dropdown-link active"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span><i class="fa-solid fa-circle-dot active-dot"></i></a>
  <a href="commands.html" class="top-dropdown-link"><i class="fa-solid fa-terminal"></i><span>Commands</span></a>
  <a href="leaderboard.html" class="top-dropdown-link"><i class="fa-solid fa-trophy"></i><span>Leaderboard</span></a>
  <a href="snippets.html" class="top-dropdown-link"><i class="fa-solid fa-code"></i><span>Snippets</span></a>
  <a href="portfolio.html" class="top-dropdown-link"><i class="fa-solid fa-user"></i><span>Portfolio</span></a>
  <a href="linktree.html" class="top-dropdown-link"><i class="fa-solid fa-link"></i><span>Links</span></a>
  <a href="contribute.html" class="top-dropdown-link"><i class="fa-solid fa-heart"></i><span>Contribute</span></a>
  <a href="feedback.html" class="top-dropdown-link"><i class="fa-solid fa-paper-plane"></i><span>Feedback</span></a>
</div>
<div class="top-overlay" id="topOverlay" onclick="closeDashMenu()"></div>

<!-- CONTENT -->
<div class="content" id="mainContent">
  <div class="loading-state"><div class="spinner"></div><span>Memuat data...</span></div>
</div>

<script src="assets/config.js"></script>
<script>
  // Init theme
  const savedTheme = getTheme();
  document.documentElement.setAttribute("data-theme", savedTheme);
  document.getElementById("themeIcon").className = savedTheme === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";

  function toggleDashTheme() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
    document.getElementById("themeIcon").className = next === "dark" ? "fa-solid fa-sun" : "fa-solid fa-moon";
  }

  function toggleDashMenu() {
    const dd = document.getElementById("topDropdown");
    const ov = document.getElementById("topOverlay");
    const ic = document.getElementById("menuIcon");
    const isOpen = dd.classList.contains("open");
    if (isOpen) {
      dd.classList.remove("open"); ov.classList.remove("show");
      ic.className = "fa-solid fa-bars";
    } else {
      dd.classList.add("open"); ov.classList.add("show");
      ic.className = "fa-solid fa-xmark";
    }
  }

  function closeDashMenu() {
    document.getElementById("topDropdown").classList.remove("open");
    document.getElementById("topOverlay").classList.remove("show");
    document.getElementById("menuIcon").className = "fa-solid fa-bars";
  }

  let chartInstance = null;

  async function load() {
    const data = await fetchData("stats.json");
    const c = document.getElementById("mainContent");

    if (!data) {
      c.innerHTML = `
        <div style="text-align:center;padding:80px;color:var(--text-dim)">
          <i class="fa-solid fa-triangle-exclamation" style="font-size:36px;display:block;margin-bottom:14px"></i>
          <p style="font-size:13px">Data belum tersedia. Bot belum push data ke GitHub.</p>
        </div>`;
      return;
    }

    document.getElementById("updatedBadge").textContent = "Updated: " + new Date(data.lastUpdated).toLocaleTimeString("id-ID");

    const statCards = [
      { label:"Total Grup",    val:formatNum(data.totalGroups),   sub:"Grup aktif",        color:"#4ade80", icon:"fa-users" },
      { label:"Total User",    val:formatNum(data.totalUsers),    sub:"Terdaftar di bot",  color:"#60a5fa", icon:"fa-user" },
      { label:"Total Fitur",   val:data.totalFeatures,            sub:"Command tersedia",  color:"#f59e0b", icon:"fa-puzzle-piece" },
      { label:"Total Command", val:formatNum(data.totalCmd),      sub:"Dijalankan",        color:"#a78bfa", icon:"fa-terminal" },
      { label:"Total Chat",    val:formatNum(data.totalChat),     sub:"Pesan masuk",       color:"#f472b6", icon:"fa-message" },
      { label:"Rating",        val:data.ratingAvg+"/10",          sub:data.ratingTotal+" votes", color:"#fbbf24", icon:"fa-star" },
    ];

    const topCmds = data.topCommands || [];
    const maxCmd = topCmds[0]?.count || 1;

    const starsHtml = Array.from({length:10},(_,i) =>
      `<i class="fa-solid fa-star${i < Math.round(data.ratingAvg) ? " on" : ""}"></i>`
    ).join("");

    const ratingBars = [10,9,8,7,6].map(score => `
      <div class="rating-bar-row">
        <span class="rl">${score}</span>
        <div class="rw"><div class="rf" style="width:${data.ratingAvg >= score ? 100 : Math.max(0,(data.ratingAvg/score)*100)}%"></div></div>
      </div>`).join("");

    const activities = [
      { icon:"fa-chart-line", color:"#4ade80", text:`Bot aktif dengan <span>${data.totalFeatures}</span> fitur`, time:"Live" },
      { icon:"fa-users",      color:"#60a5fa", text:`<span>${formatNum(data.totalUsers)}</span> user terdaftar`, time:"Live" },
      { icon:"fa-terminal",   color:"#a78bfa", text:`<span>${formatNum(data.totalCmd)}</span> command dijalankan`, time:"Total" },
      { icon:"fa-star",       color:"#fbbf24", text:`Rating bot <span>${data.ratingAvg}/10</span> dari ${data.ratingTotal} votes`, time:"All time" },
    ];

    c.innerHTML = `
      <div class="content-header fade d1">
        <h1>Bot <span>Dashboard</span></h1>
        <p>Statistik dan analitik bot secara realtime</p>
      </div>

      <div class="stat-row">
        ${statCards.map((s,i) => `
          <div class="stat-card fade d${i+1}" style="--accent-color:${s.color}">
            <div class="stat-label"><i class="fa-solid ${s.icon}" style="color:${s.color};margin-right:5px"></i>${s.label}</div>
            <div class="stat-val">${s.val}</div>
            <div class="stat-sub">${s.sub}</div>
          </div>`).join("")}
      </div>

      <div class="grid-3-1 reveal">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fa-solid fa-chart-area"></i> Feature Usage Analytics</div>
            <span class="card-badge">Top ${topCmds.length}</span>
          </div>
          <div class="card-body">
            <div class="chart-wrap"><canvas id="usageChart"></canvas></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fa-solid fa-star"></i> Rating Bot</div>
          </div>
          <div class="rating-display">
            <div class="rating-num">${data.ratingAvg}</div>
            <div class="rating-info">
              <div class="rating-stars">${starsHtml}</div>
              <div class="rating-votes">dari ${data.ratingTotal} votes</div>
              ${ratingBars}
            </div>
          </div>
        </div>
      </div>

      <div class="grid-2 reveal">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fa-solid fa-chart-bar"></i> Top Command</div>
            <span class="card-badge">${topCmds.length} commands</span>
          </div>
          <div class="cmd-list">
            ${topCmds.length ? topCmds.map((cmd,i) => `
              <div class="cmd-item">
                <span class="n">${i+1}</span>
                <span class="name">.${esc(cmd.cmd)}</span>
                <div class="bar-wrap"><div class="bar" style="width:${Math.round((cmd.count/maxCmd)*100)}%"></div></div>
                <span class="cnt">${cmd.count}</span>
              </div>`).join("")
            : `<div style="padding:20px;color:var(--text-dim);font-size:12px;text-align:center">Belum ada data</div>`}
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> Activity</div>
            <span class="card-badge">Live</span>
          </div>
          ${activities.map(a => `
            <div class="activity-item">
              <div class="activity-icon"><i class="fa-solid ${a.icon}" style="color:${a.color}"></i></div>
              <div class="activity-text">${a.text}</div>
              <div class="activity-time">${a.time}</div>
            </div>`).join("")}
        </div>
      </div>`;

    // Chart
    if (chartInstance) chartInstance.destroy();
    const chartCtx = document.getElementById("usageChart");
    if (chartCtx && topCmds.length) {
      const isDark = document.documentElement.getAttribute("data-theme") !== "light";
      chartInstance = new Chart(chartCtx, {
        type: "line",
        data: {
          labels: topCmds.map(c => "."+c.cmd),
          datasets: [{
            label: "Penggunaan",
            data: topCmds.map(c => c.count),
            borderColor: "#4ade80",
            backgroundColor: "rgba(74,222,128,0.08)",
            borderWidth: 2,
            pointBackgroundColor: "#4ade80",
            pointRadius: 4,
            pointHoverRadius: 6,
            fill: true,
            tension: 0.4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display:false },
            tooltip: {
              backgroundColor: isDark ? "#1a1a1a" : "#fff",
              borderColor: isDark ? "#262626" : "#e0e0e0",
              borderWidth: 1,
              titleColor: isDark ? "#fff" : "#111",
              bodyColor: isDark ? "#888" : "#555",
              padding: 10,
            }
          },
          scales: {
            x: {
              grid: { color: isDark ? "#1a1a1a" : "#f0f0f0" },
              ticks: { color: isDark ? "#444" : "#888", font:{ family:"Fira Code", size:10 } }
            },
            y: {
              grid: { color: isDark ? "#1a1a1a" : "#f0f0f0" },
              ticks: { color: isDark ? "#444" : "#888", font:{ family:"Fira Code", size:10 } }
            }
          }
        }
      });
    }

    // Scroll reveal
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("visible"); obs.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
