<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JS Snippets — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root { --bg:#0d0d0d; --card:#161616; --border:#262626; --text-main:#fff; --text-dim:#888; --accent:#f7df1e; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 50px 50px;
      color: var(--text-main); font-family: 'Inter',sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { opacity:0; animation: fadeUp 0.5s ease forwards; }
    .fade-up.d1 { animation-delay:0.1s; }
    .fade-up.d2 { animation-delay:0.2s; }
    .fade-up.d3 { animation-delay:0.3s; }
    .reveal { opacity:0; transform:translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    .hero { padding: 60px 0 40px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1a1400; border: 1px solid #f7df1e33;
      border-radius: 20px; padding: 5px 14px;
      font-size: 12px; color: var(--accent);
      margin-bottom: 20px; font-family: 'Fira Code',monospace;
    }
    .hero h1 { font-size: 3rem; font-weight: 800; letter-spacing: -2px; line-height: 1.1; margin-bottom: 12px; }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.7; max-width: 500px; margin-bottom: 24px; }

    .hero-stats { display:flex; gap:20px; margin-bottom:36px; flex-wrap:wrap; }
    .hero-stat { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); }
    .hero-stat .val { color:var(--text-main); font-weight:700; font-size:16px; }
    .hero-stat i { color:var(--accent); font-size:12px; }

    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .toolbar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap i { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:13px; }
    .search-input {
      width:100%; background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:10px 14px 10px 36px; color:var(--text-main);
      font-family:'Inter',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s;
    }
    .search-input:focus { border-color:#f7df1e44; }
    .search-input::placeholder { color:#444; }
    .sort-select {
      background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:10px 14px; color:var(--text-dim);
      font-family:'Inter',sans-serif; font-size:13px; outline:none; cursor:pointer;
      transition: border-color 0.2s;
    }
    .sort-select:focus { border-color:#f7df1e44; }

    /* SNIPPETS LIST */
    .snippets-list { display: flex; flex-direction: column; gap: 10px; }

    .snippet-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer; transition: border-color 0.2s, transform 0.2s, background 0.2s;
    }
    .snippet-row:hover { border-color: #f7df1e33; transform: translateX(4px); background: #1a1a1a; }

    .snippet-row-left { flex: 1; min-width: 0; }

    .snippet-row-title {
      font-size: 14px; font-weight: 600; margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .snippet-row-meta {
      display: flex; align-items: center; gap: 12px;
      font-size: 11px; color: var(--text-dim); flex-wrap: wrap;
    }

    .snippet-row-meta .author { color: var(--accent); font-family:'Fira Code',monospace; }
    .snippet-row-meta i { font-size: 10px; }

    .js-badge {
      background: #f7df1e22; border: 1px solid #f7df1e44;
      border-radius: 4px; padding: 2px 7px; font-size: 10px;
      font-weight: 700; color: var(--accent); font-family:'Fira Code',monospace;
      flex-shrink: 0;
    }

    .snippet-row-right {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }

    .btn-view {
      background: #1a1a1a; border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; color: var(--text-dim);
      font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; font-family:'Inter',sans-serif;
    }
    .btn-view:hover { border-color: #f7df1e44; color: var(--accent); }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(6px);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; animation: fadeUp 0.25s ease; }

    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 820px; max-height: 90vh;
      overflow: hidden; display: flex; flex-direction: column;
    }

    .modal-header {
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }

    .modal-header-left { flex: 1; min-width: 0; }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
    .modal-meta { display:flex; align-items:center; gap:12px; font-size:12px; color:var(--text-dim); flex-wrap:wrap; }
    .modal-meta .author { color: var(--accent); font-family:'Fira Code',monospace; }

    .modal-close {
      background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px;
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-dim); font-size: 13px;
      transition: all 0.2s; flex-shrink: 0;
    }
    .modal-close:hover { border-color: #444; color: #fff; }

    .modal-body { overflow-y: auto; flex: 1; }
    .modal-body pre { margin:0; font-size:13px; line-height:1.7; background:#0a0a0a!important; border-radius:0; padding:20px 22px!important; }

    .modal-footer {
      padding: 13px 22px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .modal-footer-left { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--text-dim); }

    .btn-copy-full {
      background: var(--accent); color: #000; border: none;
      border-radius: 7px; padding: 9px 18px; font-size: 13px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: opacity 0.2s, transform 0.2s; font-family:'Inter',sans-serif;
    }
    .btn-copy-full:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-copy-full.copied { background: #4ade80; }

    /* EMPTY & LOADING */
    .empty-state { text-align:center; padding:80px 24px; color:#333; }
    .empty-state i { font-size:40px; margin-bottom:16px; display:block; }
    .empty-state p { font-size:13px; }
    .empty-state .cmd { display:inline-block; margin-top:10px; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:6px 14px; font-family:'Fira Code',monospace; font-size:12px; color:var(--accent); }

    .loading-state { display:flex; align-items:center; justify-content:center; gap:12px; padding:80px; color:#333; font-size:13px; }
    .spinner { width:18px; height:18px; border:2px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:700px) {
      .hero h1 { font-size: 2rem; }
      .container { padding: 0 16px; }
      .snippet-row { flex-wrap: wrap; }
      .snippet-row-right { width: 100%; }
      .btn-view { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <div class="hero">
      <div class="hero-badge fade-up d1"><i class="fa-brands fa-js" style="font-size:11px"></i> JavaScript Only — Public</div>
      <h1 class="fade-up d2">JS <span>Snippets</span><br>Collection.</h1>
      <p class="fade-up d3">Kumpulan snippet JavaScript yang disimpan via bot Alya MD. Simpan, temukan, dan copy code kapanpun.</p>
      <div class="hero-stats fade-up d4">
        <div class="hero-stat"><i class="fa-solid fa-code"></i> <span class="val" id="totalSnippets">-</span> snippets</div>
        <div class="hero-stat"><i class="fa-solid fa-users"></i> <span class="val" id="totalAuthors">-</span> contributors</div>
      </div>
    </div>

    <div class="section-label reveal">Semua Snippets</div>

    <div class="toolbar reveal">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input class="search-input" type="text" placeholder="Cari judul, author, atau code..." id="searchBox" oninput="filter()"/>
      </div>
      <select class="sort-select" id="sortSelect" onchange="filter()">
        <option value="newest">Terbaru</option>
        <option value="oldest">Terlama</option>
        <option value="az">A-Z</option>
      </select>
    </div>

    <div id="snippetsContainer">
      <div class="loading-state"><div class="spinner"></div><span>Memuat snippets...</span></div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-header-left">
          <div class="modal-title" id="modalTitle">-</div>
          <div class="modal-meta">
            <span class="author" id="modalAuthor">-</span>
            <span id="modalDate">-</span>
            <span id="modalId">-</span>
          </div>
        </div>
        <button class="modal-close" onclick="closeModalDirect()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <pre><code class="language-javascript" id="modalCode"></code></pre>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-left">
          <span id="modalLines">-</span>
          <span id="modalSize">-</span>
        </div>
        <button class="btn-copy-full" id="btnCopyFull" onclick="copyFull()">
          <i class="fa-solid fa-copy"></i> Copy Code
        </button>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    injectNavCSS();
    renderNav();

    let allSnippets = [];
    let currentCode = "";

    async function load() {
      const data = await fetchData("snippets.json");
      if (!data) {
        document.getElementById("snippetsContainer").innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p>Data belum tersedia</p>
          </div>`;
        return;
      }

      allSnippets = (data.snippets || []).sort((a, b) => b.createdAt - a.createdAt);
      setLastUpdated(data.lastUpdated);
      document.getElementById("totalSnippets").textContent = allSnippets.length;
      document.getElementById("totalAuthors").textContent = new Set(allSnippets.map(s => s.author)).size;
      render(allSnippets);
    }

    function render(snippets) {
      const c = document.getElementById("snippetsContainer");
      if (!snippets.length) {
        c.innerHTML = `
          <div class="empty-state">
            <i class="fa-brands fa-js"></i>
            <p>Belum ada snippet</p>
            <div class="cmd">.snippet save Nama Snippet</div>
          </div>`;
        return;
      }

      c.innerHTML = `<div class="snippets-list">${snippets.map((s, i) => {
        const lines = s.code.split("\n").length;
        const date = new Date(s.createdAt).toLocaleDateString("id-ID", { day:"numeric", month:"short", year:"numeric" });
        return `
          <div class="snippet-row reveal" onclick="openModal(${allSnippets.indexOf(s)})">
            <div class="snippet-row-left">
              <div class="snippet-row-title">${esc(s.title)}</div>
              <div class="snippet-row-meta">
                <span class="author">@${esc(s.author)}</span>
                <span><i class="fa-solid fa-calendar"></i> ${date}</span>
                <span><i class="fa-solid fa-lines-leaning"></i> ${lines} baris</span>
                <span><i class="fa-solid fa-hashtag"></i> ${s.id}</span>
              </div>
            </div>
            <div class="snippet-row-right">
              <span class="js-badge">JS</span>
              <button class="btn-view" onclick="openModal(${allSnippets.indexOf(s)})">
                <i class="fa-solid fa-eye"></i> Lihat Code
              </button>
            </div>
          </div>`;
      }).join("")}</div>`;

      // Scroll reveal
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add("visible"), i * 50);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.05 });
      document.querySelectorAll(".snippet-row.reveal").forEach(el => observer.observe(el));
    }

    function filter() {
      const q = document.getElementById("searchBox").value.toLowerCase();
      const sort = document.getElementById("sortSelect").value;

      let filtered = allSnippets.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.author.toLowerCase().includes(q) ||
        s.code.toLowerCase().includes(q) ||
        s.id.toLowerCase().includes(q)
      );

      if (sort === "newest") filtered.sort((a, b) => b.createdAt - a.createdAt);
      else if (sort === "oldest") filtered.sort((a, b) => a.createdAt - b.createdAt);
      else if (sort === "az") filtered.sort((a, b) => a.title.localeCompare(b.title));

      render(filtered);
    }

    function openModal(i) {
      const s = allSnippets[i];
      if (!s) return;
      currentCode = s.code;

      document.getElementById("modalTitle").textContent = s.title;
      document.getElementById("modalAuthor").textContent = "@" + s.author;
      document.getElementById("modalDate").textContent = new Date(s.createdAt).toLocaleString("id-ID");
      document.getElementById("modalId").textContent = "ID: " + s.id;
      document.getElementById("modalCode").textContent = s.code;
      document.getElementById("modalLines").textContent = s.code.split("\n").length + " baris";
      document.getElementById("modalSize").textContent = (new Blob([s.code]).size / 1024).toFixed(2) + " KB";
      document.getElementById("btnCopyFull").className = "btn-copy-full";
      document.getElementById("btnCopyFull").innerHTML = '<i class="fa-solid fa-copy"></i> Copy Code';

      hljs.highlightElement(document.getElementById("modalCode"));
      document.getElementById("modalOverlay").classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeModal(e) {
      if (e.target.id === "modalOverlay") closeModalDirect();
    }

    function closeModalDirect() {
      document.getElementById("modalOverlay").classList.remove("show");
      document.body.style.overflow = "";
    }

    function copyFull() {
      navigator.clipboard.writeText(currentCode).then(() => {
        const btn = document.getElementById("btnCopyFull");
        btn.className = "btn-copy-full copied";
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
        setTimeout(() => {
          btn.className = "btn-copy-full";
          btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copy Code';
        }, 2000);
      });
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeModalDirect();
    });

    // Scroll reveal untuk section label dan toolbar
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));

    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
