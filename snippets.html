<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JS Snippets — Alya MD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root { --bg:#0d0d0d; --card:#161616; --border:#262626; --text-main:#fff; --text-dim:#888; --accent:#f7df1e; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 50px 50px;
      color: var(--text-main); font-family: 'Inter',sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .page-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
    .page-title span { color: var(--accent); }
    .page-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
    .hero-stats { display:flex; gap:20px; margin-bottom:36px; flex-wrap:wrap; }
    .hero-stat { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); }
    .hero-stat .val { color:var(--text-main); font-weight:700; }
    .hero-stat i { color:var(--accent); font-size:12px; }
    .toolbar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .search-wrap { position:relative; flex:1; min-width:200px; }
    .search-wrap i { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:13px; }
    .search-input {
      width:100%; background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:10px 14px 10px 36px; color:var(--text-main);
      font-family:'Inter',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s;
    }
    .search-input:focus { border-color:#f7df1e44; }
    .search-input::placeholder { color:#444; }
    .sort-select {
      background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:10px 14px; color:var(--text-dim);
      font-family:'Inter',sans-serif; font-size:13px; outline:none; cursor:pointer;
    }
    .snippets-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px; }
    .snippet-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; overflow:hidden;
      transition:border-color 0.2s, transform 0.2s; cursor:pointer;
    }
    .snippet-card:hover { border-color:#f7df1e44; transform:translateY(-3px); }
    .snippet-card-header {
      padding:15px 17px 12px; border-bottom:1px solid var(--border);
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .snippet-title { font-size:14px; font-weight:600; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .snippet-meta { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text-dim); }
    .snippet-meta .author { color:var(--accent); font-family:'Fira Code',monospace; }
    .js-badge {
      background:#f7df1e22; border:1px solid #f7df1e44;
      border-radius:4px; padding:3px 8px; font-size:10px;
      font-weight:700; color:var(--accent); font-family:'Fira Code',monospace; flex-shrink:0;
    }
    .snippet-preview { padding:0; max-height:150px; overflow:hidden; position:relative; }
    .snippet-preview pre { margin:0; font-size:12px; line-height:1.6; background:#0a0a0a!important; border-radius:0; padding:13px 17px!important; max-height:150px; overflow:hidden; }
    .snippet-preview::after { content:''; position:absolute; bottom:0; left:0; right:0; height:48px; background:linear-gradient(transparent,#0a0a0a); }
    .snippet-card-footer { padding:9px 17px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--border); }
    .snippet-footer-left { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text-dim); }
    .btn-copy-small {
      background:#1a1a1a; border:1px solid var(--border);
      border-radius:6px; padding:5px 10px; color:var(--text-dim);
      font-size:11px; cursor:pointer; display:flex; align-items:center; gap:5px;
      transition:all 0.2s; font-family:'Inter',sans-serif;
    }
    .btn-copy-small:hover { border-color:#f7df1e44; color:var(--accent); }
    .btn-copy-small.copied { border-color:#4ade8044; color:#4ade80; }
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.85); backdrop-filter:blur(4px);
      z-index:200; align-items:center; justify-content:center; padding:24px;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--card); border:1px solid var(--border);
      border-radius:14px; width:100%; max-width:800px; max-height:90vh;
      overflow:hidden; display:flex; flex-direction:column;
    }
    .modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-size:15px; font-weight:700; }
    .modal-meta { font-size:12px; color:var(--text-dim); margin-top:3px; }
    .modal-close {
      background:#1a1a1a; border:1px solid var(--border); border-radius:6px;
      width:32px; height:32px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--text-dim); font-size:13px; transition:all 0.2s; flex-shrink:0;
    }
    .modal-close:hover { border-color:#444; color:#fff; }
    .modal-body { overflow-y:auto; flex:1; }
    .modal-body pre { margin:0; font-size:13px; line-height:1.7; background:#0a0a0a!important; border-radius:0; padding:20px 22px!important; }
    .modal-footer {
      padding:13px 22px; border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .modal-footer-left { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--text-dim); }
    .btn-copy-full {
      background:var(--accent); color:#000; border:none;
      border-radius:7px; padding:9px 18px; font-size:13px; font-weight:700;
      cursor:pointer; display:flex; align-items:center; gap:7px;
      transition:opacity 0.2s; font-family:'Inter',sans-serif;
    }
    .btn-copy-full:hover { opacity:0.85; }
    .btn-copy-full.copied { background:#4ade80; }
    .empty-state { text-align:center; padding:80px 24px; color:#333; }
    .empty-state i { font-size:36px; margin-bottom:14px; display:block; }
    .empty-state p { font-size:13px; }
    .empty-state .cmd { display:inline-block; margin-top:10px; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:6px 14px; font-family:'Fira Code',monospace; font-size:12px; color:var(--accent); }
    .loading-state { display:flex; align-items:center; justify-content:center; gap:12px; padding:80px; color:#333; font-size:13px; }
    .spinner { width:18px; height:18px; border:2px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:700px) { .snippets-grid { grid-template-columns:1fr; } .container { padding:24px 16px; } }
  </style>
</head>
<body>
  <div id="navbar"></div>
  <div class="container">
    <div class="page-title">JS <span>Snippets</span></div>
    <div class="page-sub">Kumpulan snippet JavaScript yang disimpan via bot Alya MD</div>
    <div class="hero-stats">
      <div class="hero-stat"><i class="fa-solid fa-code"></i> <span class="val" id="totalSnippets">-</span> snippets</div>
      <div class="hero-stat"><i class="fa-solid fa-users"></i> <span class="val" id="totalAuthors">-</span> contributors</div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input class="search-input" type="text" placeholder="Cari snippet..." id="searchBox" oninput="filter()"/>
      </div>
      <select class="sort-select" id="sortSelect" onchange="filter()">
        <option value="newest">Terbaru</option>
        <option value="oldest">Terlama</option>
        <option value="az">A-Z</option>
      </select>
    </div>
    <div id="snippetsContainer"><div class="loading-state"><div class="spinner"></div><span>Memuat snippets...</span></div></div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div><div class="modal-title" id="modalTitle">-</div><div class="modal-meta" id="modalMeta">-</div></div>
        <button class="modal-close" onclick="closeModalDirect()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body"><pre><code class="language-javascript" id="modalCode"></code></pre></div>
      <div class="modal-footer">
        <div class="modal-footer-left">
          <span id="modalLines">-</span>
          <span id="modalSize">-</span>
          <span id="modalDate">-</span>
        </div>
        <button class="btn-copy-full" id="btnCopyFull" onclick="copyFull()">
          <i class="fa-solid fa-copy"></i> Copy Code
        </button>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    injectNavCSS();
    renderNav();
    let allSnippets = [];
    let currentCode = "";

    async function load() {
      const data = await fetchData("snippets.json");
      if (!data) {
        document.getElementById("snippetsContainer").innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Data belum tersedia</p></div>`;
        return;
      }
      allSnippets = data.snippets || [];
      setLastUpdated(data.lastUpdated);
      document.getElementById("totalSnippets").textContent = allSnippets.length;
      document.getElementById("totalAuthors").textContent = new Set(allSnippets.map(s => s.author)).size;
      render(allSnippets);
    }

    function render(snippets) {
      const c = document.getElementById("snippetsContainer");
      if (!snippets.length) {
        c.innerHTML = `<div class="empty-state"><i class="fa-brands fa-js"></i><p>Belum ada snippet</p><div class="cmd">.snippet save Nama Snippet</div></div>`;
        return;
      }
      c.innerHTML = `<div class="snippets-grid">${snippets.map((s,i) => {
        const lines = s.code.split("\n").length;
        const date = new Date(s.createdAt).toLocaleDateString("id-ID");
        return `
          <div class="snippet-card" onclick="openModal(${i})">
            <div class="snippet-card-header">
              <div style="min-width:0">
                <div class="snippet-title">${esc(s.title)}</div>
                <div class="snippet-meta">
                  <span class="author">@${esc(s.author)}</span>
                  <span>${date}</span>
                  <span>${lines} baris</span>
                </div>
              </div>
              <span class="js-badge">JS</span>
            </div>
            <div class="snippet-preview"><pre><code class="language-javascript">${esc(s.code.slice(0,280))}</code></pre></div>
            <div class="snippet-card-footer">
              <div class="snippet-footer-left"><span><i class="fa-solid fa-hashtag"></i> ${s.id}</span></div>
              <button class="btn-copy-small" onclick="copyCard(event,${i})" id="cbtn-${i}">
                <i class="fa-solid fa-copy"></i> Copy
              </button>
            </div>
          </div>`;
      }).join("")}</div>`;
      document.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));
    }

    function filter() {
      const q = document.getElementById("searchBox").value.toLowerCase();
      const sort = document.getElementById("sortSelect").value;
      let filtered = allSnippets.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.author.toLowerCase().includes(q) ||
        s.code.toLowerCase().includes(q)
      );
      if (sort === "newest") filtered.sort((a,b) => b.createdAt - a.createdAt);
      else if (sort === "oldest") filtered.sort((a,b) => a.createdAt - b.createdAt);
      else if (sort === "az") filtered.sort((a,b) => a.title.localeCompare(b.title));
      render(filtered);
    }

    function openModal(i) {
      const s = allSnippets[i];
      currentCode = s.code;
      document.getElementById("modalTitle").textContent = s.title;
      document.getElementById("modalMeta").textContent = `oleh @${s.author} · ID: ${s.id}`;
      document.getElementById("modalCode").textContent = s.code;
      document.getElementById("modalLines").textContent = s.code.split("\n").length + " baris";
      document.getElementById("modalSize").textContent = (new Blob([s.code]).size/1024).toFixed(2) + " KB";
      document.getElementById("modalDate").textContent = new Date(s.createdAt).toLocaleString("id-ID");
      document.getElementById("btnCopyFull").className = "btn-copy-full";
      document.getElementById("btnCopyFull").innerHTML = '<i class="fa-solid fa-copy"></i> Copy Code';
      hljs.highlightElement(document.getElementById("modalCode"));
      document.getElementById("modalOverlay").classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeModal(e) { if (e.target.id === "modalOverlay") closeModalDirect(); }
    function closeModalDirect() { document.getElementById("modalOverlay").classList.remove("show"); document.body.style.overflow = ""; }

    function copyFull() {
      navigator.clipboard.writeText(currentCode).then(() => {
        const btn = document.getElementById("btnCopyFull");
        btn.className = "btn-copy-full copied";
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
        setTimeout(() => { btn.className = "btn-copy-full"; btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copy Code'; }, 2000);
      });
    }

    function copyCard(e, i) {
      e.stopPropagation();
      navigator.clipboard.writeText(allSnippets[i].code).then(() => {
        const btn = document.getElementById(`cbtn-${i}`);
        btn.className = "btn-copy-small copied";
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
        setTimeout(() => { btn.className = "btn-copy-small"; btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copy'; }, 2000);
      });
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModalDirect(); });
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
